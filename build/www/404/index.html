<!DOCTYPE html>
<html>
	<head>
		<title>404 Not Found</title>
		<!--The README CSS is small, it's ok to use an internal stylesheet-->
		<style>
			@font-face{
				font-family: "Tahoma";
				src: url("../font/Tahoma/Tahoma.woff");
			}
			body{
				background-color: #6d33a0;
				align-items: center;
			}
			#content{
				font-family: "Tahoma";
    			width: 75%;
    			margin: 32px auto;
    			padding: 32px;
    			background-color: rgba(255, 255, 225, 0.8);
    			border-radius: 10px;
    			border: 1px solid black;
			}
			@keyframes rainbowtxt {
				from{filter:hue-rotate(0deg)}
				to{filter:hue-rotate(360deg)}
			}
			.rainb {
				color:red;
				animation: rainbowtxt 1s linear infinite;
			}
		</style>
	</head>
	<body>
		<div id=content>
			<img src="../img/readme/logo.png"><br>
			<h2>404 Not Found</h2>

		</div>
	</body>

</html>
